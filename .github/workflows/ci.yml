name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: PHP ${{ matrix.php }} — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php: ['8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Security audit
        run: composer audit

      - name: Lint (PHP-CS-Fixer dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --using-cache=no

      - name: Static analysis (PHPStan level 9)
        run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress

      - name: Tests
        run: vendor/bin/phpunit --no-output
        # Remove --no-output once tests are written and passing
